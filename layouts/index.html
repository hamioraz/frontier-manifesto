{{- define "main" }}
<div class="home-logo">
  <img src="/favicon.svg" alt="Frontier Manifesto" width="96" height="96">
</div>
{{- if .Content }}
<div class="post-content md-content">
  {{- if not (.Param "disableAnchoredHeadings") }}
  {{- partial "anchored_headings.html" .Content -}}
  {{- else }}{{ .Content }}{{ end }}
</div>
{{- end }}
{{- end }}
